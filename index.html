<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NOVERA — Coffee & Dessert</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
:root {
  --accent: #1a3d2b; --cream: #faf7f2; --surface: #ffffff;
  --ink: #000000; --ink-light: #554433;
  --border: rgba(0,0,0,0.08); --ease: cubic-bezier(0.23, 1, 0.32, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--ink); }

/* ── LOGO BİLEŞENİ (SVG) ── */
.novera-logo { display: inline-block; }
.novera-logo svg { width: 100%; height: auto; display: block; }
.logo-white { filter: brightness(0) invert(1); } /* Koyu zeminde beyaz logo */
.logo-black { filter: brightness(0); } /* Açık zeminde siyah logo */

/* ── HERO ── */
.hero {
  height: 160px; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.hero-logo-wrap { width: 160px; z-index: 10; transform: translateY(5px); }

/* ── KATEGORİ NAV (Akışkan) ── */
.sticky-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250, 247, 242, 0.85); backdrop-filter: blur(20px);
  padding: 12px 0; border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; scrollbar-width: none;
}
.sticky-nav::-webkit-scrollbar { display: none; }
.nav-pill {
  flex-shrink: 0; padding: 8px 22px; margin: 0 6px;
  border-radius: 40px; font-size: 13px; font-weight: 600;
  color: var(--ink-light); cursor: pointer; transition: 0.4s var(--ease);
}
.nav-pill.active { background: var(--accent); color: white; }

/* ── ÜRÜN KARTLARI ── */
.item-card {
  background: var(--surface); border-radius: 24px; margin: 12px; padding: 12px;
  display: flex; gap: 16px; border: 1px solid var(--border);
  box-shadow: 0 4px 20px rgba(0,0,0,0.02);
}
.item-img { width: 90px; height: 90px; border-radius: 18px; object-fit: cover; background: #f2f2f2; }
.item-name { font-size: 16px; font-weight: 700; color: #000; }
.item-desc { font-size: 11px; color: var(--ink-light); line-height: 1.5; margin: 4px 0 8px; font-weight: 400; }

/* Boyut Çipleri */
.size-row { display: flex; gap: 6px; }
.size-chip {
  background: var(--cream); padding: 4px 10px; border-radius: 10px;
  font-size: 10px; font-weight: 700; color: var(--accent); border: 1px solid rgba(26,61,43,0.1);
}

/* ── ADMIN PANELİ TASARIMI ── */
.a-layout { display: flex; min-height: 100vh; background: #fff; }
.a-sidebar { width: 260px; border-right: 1px solid #eee; padding: 25px 0; display: flex; flex-direction: column; }
.a-sidebar-logo { width: 100px; padding: 0 25px 30px; }
.asb-btn {
  padding: 12px 25px; border: none; background: none; font-family: 'Poppins';
  font-size: 14px; text-align: left; cursor: pointer; color: #777; transition: 0.3s;
  display: flex; align-items: center; gap: 12px;
}
.asb-btn.active { color: var(--accent); background: #f0f7f3; font-weight: 600; border-left: 4px solid var(--accent); }

.a-main { flex: 1; padding: 40px; background: #fafafa; overflow-y: auto; }
.a-panel { display: none; }
.a-panel.active { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Footer */
footer { padding: 50px 0; text-align: center; background: var(--cream); }
.footer-logo-wrap { width: 120px; margin: 0 auto 10px; }
</style>
</head>
<body>

<div id="menu-view" class="page active">
  <div class="hero">
    <div class="hero-logo-wrap novera-logo logo-white">
      <svg><use xlink:href="#novera-svg"></use></svg>
    </div>
  </div>

  <nav class="sticky-nav" id="cat-nav"></nav>
  <div id="menu-body" style="padding-bottom:100px"></div>

  <footer>
    <div class="footer-logo-wrap novera-logo logo-black">
      <svg><use xlink:href="#novera-svg"></use></svg>
    </div>
    <p style="font-size:11px; font-weight:400; color:var(--ink-light); margin-top:10px;">Specialty Coffee & Dessert</p>
  </footer>
</div>

<!-- ADMIN -->
<div id="admin-view" class="page">
  <div class="a-layout">
    <div class="a-sidebar">
      <div class="a-sidebar-logo novera-logo logo-black">
        <svg><use xlink:href="#novera-svg"></use></svg>
      </div>
      <button class="asb-btn active" id="btn-settings" onclick="swPanel('settings')">
        <span class="material-icons-round">settings</span> Ayarlar
      </button>
      <button class="asb-btn" id="btn-categories" onclick="swPanel('categories')">
        <span class="material-icons-round">list</span> Kategoriler
      </button>
      <div id="sidebar-dynamic-cats"></div>
      <button class="asb-btn" style="margin-top:auto; color:#b43c1e;" onclick="window.location.reload()">
        <span class="material-icons-round">logout</span> Çıkış Yap
      </button>
    </div>
    
    <div class="a-main">
      <!-- Ayarlar Paneli -->
      <div class="a-panel active" id="panel-settings">
        <h2 style="margin-bottom:20px;">Genel Ayarlar</h2>
        <p>Mağaza adı, logonun altındaki duyuru ve iletişim bilgilerini buradan güncelleyin.</p>
      </div>

      <!-- Kategori Paneli -->
      <div class="a-panel" id="panel-categories">
        <h2 style="margin-bottom:20px;">Kategorileri Yönet</h2>
        <div id="clist"></div>
      </div>

      <!-- Ürün Panelleri (JS ile dolacak) -->
      <div id="dynamic-panels"></div>
    </div>
  </div>
</div>

<script>
// Mock Veri (Firebase entegrasyonu için şema)
let D = {
  categories: [
    {id: "c1", name: "Sıcak İçecekler"},
    {id: "c2", name: "Tatlılar"}
  ],
  items: {
    c1: [
      {id: "i1", name: "Americano", desc: "Sıcak su ile inceltilmiş double espresso", price: "140", sizes: {S:{on:true, price:"140"}, M:{on:true, price:"160"}}},
      {id: "i2", name: "Latte", desc: "Bol sütlü ve yumuşak içimli kahve", price: "160", sizes: {S:{on:true, price:"160"}, L:{on:true, price:"190"}}}
    ]
  }
};

// PANEL GEÇİŞ SİSTEMİ (Kırılmaz Mimarisi)
function swPanel(id) {
  // Tüm panelleri gizle
  document.querySelectorAll('.a-panel').forEach(p => p.classList.remove('active'));
  // Tüm butonları pasif yap
  document.querySelectorAll('.asb-btn').forEach(b => b.classList.remove('active'));
  
  // Hedef paneli göster
  const target = document.getElementById('panel-' + id);
  if(target) target.classList.add('active');
  
  // Hedef butonu aktif yap
  const btn = document.getElementById('btn-' + id);
  if(btn) btn.classList.add('active');
}

// ADMIN RENDER (Kategori Sayfaları Dahil)
function renderAdmin() {
  const sidebar = document.getElementById('sidebar-dynamic-cats');
  const panels = document.getElementById('dynamic-panels');
  sidebar.innerHTML = ""; panels.innerHTML = "";
  
  D.categories.forEach(cat => {
    // Sidebar butonu
    sidebar.innerHTML += `
      <button class="asb-btn" id="btn-items-${cat.id}" onclick="swPanel('items-${cat.id}')">
        <span class="material-icons-round">restaurant_menu</span> ${cat.name}
      </button>`;
      
    // Ürün yönetim paneli
    panels.innerHTML += `
      <div class="a-panel" id="panel-items-${cat.id}">
        <h2>${cat.name} Ürün Yönetimi</h2>
        <div id="grid-${cat.id}" style="margin-top:20px;">
          <!-- Ürün kartları buraya gelecek -->
        </div>
      </div>`;
  });
}

// MENÜ RENDER
function renderMenu() {
  const body = document.getElementById('menu-body');
  const nav = document.getElementById('cat-nav');
  body.innerHTML = ""; nav.innerHTML = "";

  D.categories.forEach((cat, idx) => {
    nav.innerHTML += `<div class="nav-pill ${idx===0?'active':''}" onclick="scrollToCat('${cat.id}')">${cat.name}</div>`;
    
    let html = (D.items[cat.id] || []).map(it => `
      <div class="item-card">
        <img src="${it.img || ''}" class="item-img" onerror="this.src='https://via.placeholder.com/150'">
        <div class="item-info">
          <div class="item-name">${it.name}</div>
          <div class="item-desc">${it.desc || ''}</div>
          <div class="size-row">
            ${it.sizes?.S?.on ? `<span class="size-chip">K: ${it.sizes.S.price}₺</span>` : ''}
            ${it.sizes?.M?.on ? `<span class="size-chip">O: ${it.sizes.M.price}₺</span>` : ''}
            ${it.sizes?.L?.on ? `<span class="size-chip">B: ${it.sizes.L.price}₺</span>` : ''}
            ${(!it.sizes?.S?.on && !it.sizes?.M?.on && !it.sizes?.L?.on) ? `<span style="font-weight:800">${it.price}₺</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    
    body.innerHTML += `<div id="sec-${cat.id}"><h3 style="padding:25px 15px 10px; font-weight:800;">${cat.name}</h3>${html}</div>`;
  });
}

function scrollToCat(id) {
  const el = document.getElementById('sec-' + id);
  if(el) {
    const yOffset = -70; 
    const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
    window.scrollTo({top: y, behavior: 'smooth'});
  }
}

// Şifre kontrolü sonrası Admin panelini hazırla
function openAdmin() {
  document.getElementById('menu-view').classList.remove('active');
  document.getElementById('admin-view').classList.add('active');
  renderAdmin();
  swPanel('settings'); // İlk girişte Ayarlar açılır
}

// İlk Çalıştırma
renderMenu();
</script>
</body>
</html>
